version: '3.8'

services:

  # ── Zookeeper (required by Kafka) ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cyber-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka broker ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - cyber-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka topic setup (runs once then exits) ──────────────────────────
  kafka-setup:
    build: ./docker/kafka-setup
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cyber-net

  # ── Cassandra ─────────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=CyberCluster
      - CASSANDRA_DC=datacenter1
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - cyber-net
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Cassandra schema init (runs once then exits) ──────────────────────
  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./docker/cassandra-init.cql:/init.cql
    command: cqlsh cassandra -f /init.cql
    networks:
      - cyber-net

# ── Spark master ──────────────────────────────────────────────────────
  spark-master:
    build: ./docker/spark
    container_name: spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark master port
    command: bash -c "/opt/spark/sbin/start-master.sh -h spark-master && tail -f /opt/spark/logs/*"
    networks:
      - cyber-net

# ── Spark worker ──────────────────────────────────────────────────────
  spark-worker:
    build: ./docker/spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    command: bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/*"
    networks:
      - cyber-net

  # ── Kafka producer (sends CSV logs to Kafka) ──────────────────────────
  producer:
    build: ./docker/spark
    container_name: kafka-producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./streaming:/app
      - ./data:/data
    working_dir: /app
    command: python3 kafka_producer.py
    networks:
      - cyber-net

  # ── Spark Streaming detection job ────────────────────────────────────
  spark-streaming:
    build: ./docker/spark
    container_name: spark-streaming
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    volumes:
      - ./streaming:/app
      - ./data:/data
    working_dir: /app
    command: >
      spark-submit
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.3.0,com.datastax.spark:spark-cassandra-connector_2.12:3.3.0
      --conf spark.cassandra.connection.host=cassandra
      spark_streaming.py
    networks:
      - cyber-net

volumes:
  cassandra-data:

networks:
  cyber-net:
    driver: bridge
